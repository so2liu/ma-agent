name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64]
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Cache Electron
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/electron
          key: electron-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: electron-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint & typecheck
        run: bun run lint && bun run typecheck

      - name: Test
        run: bun run test

      - name: Build Electron app
        env:
          HMAC_SECRET: ${{ secrets.PARSE_SERVER_HMAC_SECRET }}
        run: bun run build

      - name: Package for macOS (${{ matrix.arch }})
        timeout-minutes: 90
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEBUG: electron-builder,electron-notarize*
        run: |
          npx electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: macos-${{ matrix.arch }}
          path: |
            dist/*.zip
            dist/*.dmg
            dist/*.blockmap
            dist/latest-mac*.yml

  publish-release:
    needs: build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Extract and verify version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ steps.version.outputs.version }}" \
            --generate-notes \
            dist/*

      - name: Upload to Volcengine TOS via relay server
        continue-on-error: true
        timeout-minutes: 30
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 25m
          script: |
            set -e
            WORK_DIR=$(mktemp -d)
            cd "$WORK_DIR"

            # Download release assets from GitHub
            echo "Downloading release assets for ${{ github.ref_name }}..."
            for url in $(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" \
              | python3 -c "import sys,json; [print(a['browser_download_url']) for a in json.load(sys.stdin).get('assets',[])]"); do
              echo "  Downloading $(basename "$url")..."
              curl -sL -O "$url"
            done

            # Install TOS SDK and upload
            pip install tos --quiet 2>/dev/null || pip3 install tos --quiet
            python3 -c "
            import tos, glob, os
            client = tos.TosClientV2(
              ak='${{ secrets.VOLC_ACCESS_KEY }}',
              sk='${{ secrets.VOLC_SECRET_KEY }}',
              endpoint='tos-cn-beijing.volces.com',
              region='cn-beijing',
            )
            bucket = 'ma-agent-releases'
            prefix = 'releases/release'
            patterns = ['*.dmg', '*.zip', '*.blockmap', '*-mac*.yml']
            files = []
            for p in patterns:
              files.extend(glob.glob(p))
            print(f'Uploading {len(files)} file(s) to TOS...')
            for f in files:
              key = f'{prefix}/{os.path.basename(f)}'
              size_mb = os.path.getsize(f) / (1024*1024)
              print(f'  {os.path.basename(f)} ({size_mb:.1f} MB)')
              client.upload_file(bucket, key, f, part_size=10*1024*1024, task_num=4)
              print(f'  Done: {os.path.basename(f)}')
            print('All files uploaded.')
            "

            # Cleanup
            cd /
            rm -rf "$WORK_DIR"
