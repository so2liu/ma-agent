name: Nightly Release

on:
  schedule:
    - cron: '0 0 * * *' # UTC 00:00 daily
  workflow_dispatch: # allow manual trigger

concurrency:
  group: nightly-release
  cancel-in-progress: true

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check if there are new commits since last nightly
        id: check
        run: |
          # For manual trigger, always build
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Check if any commits in last 24 hours
          LAST_24H=$(git log --since="24 hours ago" --oneline | wc -l)
          if [ "$LAST_24H" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

  build-macos:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: macos-latest
    outputs:
      nightly_version: ${{ steps.nightly-version.outputs.nightly_version }}
      nightly_tag: ${{ steps.nightly-version.outputs.nightly_tag }}
      short_sha: ${{ steps.nightly-version.outputs.short_sha }}
    strategy:
      matrix:
        arch: [arm64]
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v3
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Cache Electron
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/electron
          key: electron-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: electron-${{ runner.os }}-

      - name: Generate nightly version
        id: nightly-version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y%m%d)
          BASE_VERSION=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          NEXT_PATCH=$((PATCH + 1))
          NIGHTLY_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-nightly.${DATE}.${SHORT_SHA}"
          echo "nightly_version=${NIGHTLY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "nightly_tag=v${NIGHTLY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set nightly version in package.json
        run: node -e "const fs = require('fs'); const p = JSON.parse(fs.readFileSync('package.json','utf-8')); p.version = '${{ steps.nightly-version.outputs.nightly_version }}'; fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');"

      - name: Install dependencies
        run: bun install --no-save

      - name: Build Electron app
        env:
          HMAC_SECRET: ${{ secrets.PARSE_SERVER_HMAC_SECRET }}
        run: bun run build

      - name: Package for macOS (${{ matrix.arch }})
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          npx electron-builder --mac --${{ matrix.arch }} -c.mac.notarize=false --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: macos-${{ matrix.arch }}
          path: |
            dist/*.zip
            dist/*.dmg
            dist/*.blockmap
            dist/latest-mac*.yml
          retention-days: 7

  publish-nightly:
    needs: build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Create nightly prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.build-macos.outputs.nightly_tag }}" \
            --title "Nightly Build (${{ needs.build-macos.outputs.short_sha }})" \
            --notes "Automated nightly build from \`main\` branch.

          **Commit:** ${{ github.sha }}
          **Version:** ${{ needs.build-macos.outputs.nightly_version }}
          **Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)

          > This is a pre-release build and may be unstable. Enable the nightly update channel in Settings to receive these updates automatically." \
            --prerelease \
            dist/*

      - name: Delete old nightly releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete old nightly prereleases now that the new one is published
          gh release list --limit 100 --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease) | select(.tagName | startswith("v") and contains("-nightly.")) | .tagName' \
            | while read -r tag; do
                # Skip the release we just created
                if [ "$tag" = "${{ needs.build-macos.outputs.nightly_tag }}" ]; then
                  continue
                fi
                echo "Deleting old nightly release: $tag"
                gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
              done
          # Also clean up legacy 'nightly' tag if it exists
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
