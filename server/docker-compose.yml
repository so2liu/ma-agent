services:
  parse-server:
    image: ghcr.io/so2liu/ma-agent-parse-server:latest
    container_name: ma-agent-parse-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:3460:3456"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - HMAC_SECRET=${HMAC_SECRET}
      - EXTRACTOR_MODEL=${EXTRACTOR_MODEL:-}
      - PORT=3456
